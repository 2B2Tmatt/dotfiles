$wallpapers = ~/Pictures/wallpapers/forest-black.jpg

# BACKGROUND
background {
    monitor =
    path = $wallpapers
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    disable_loading_bar = false
    grace = 1
}

# --- LEFT COLUMN ---

# LOGIN CARD
shape {
    monitor =
    size = 360, 380
    color = rgba(0, 0, 0, 0.3)
    rounding = 25
    border_size = 0
    position = -200, 160
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] hostname
    color = rgba(185, 175, 165, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -200, 300
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = Log in
    color = rgba(230, 220, 198, 1.0) # Matched to Waybar soft off-white
    font_size = 42
    font_family = JetBrainsMono Nerd Font
    position = -200, 240
    halign = center
    valign = center
    zindex = 2
}

# Username Display 
shape {
    monitor =
    size = 320, 70
    color = rgba(43, 42, 39, 1.0) # Matched to Waybar deep slate gray
    rounding = 20
    position = -200, 130
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$USER</b>"
    color = rgba(230, 220, 198, 1.0) # Light text on dark slate username card
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = -210, 125 # Adjusted from -310 to correctly center the text over the card
    halign = center
    valign = center
    zindex = 3
}

input-field {
    monitor =
    size = 320, 70
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(129, 161, 193, 1.0) # Nix Blue active border accent
    inner_color = rgba(43, 42, 39, 1.0)   # Cozy slate gray input field background
    font_color = rgba(230, 220, 198, 1.0)  # Soft off-white typed text
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 20
    position = -200, 40
    halign = center
    valign = center
    zindex = 2
}

# CLOCK CARD
shape {
    monitor =
    size = 360, 160
    color = rgba(0, 0, 0, 0.3)
    rounding = 25
    position = -200, -140
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] date +"<b>%H:%M</b>"
    color = rgba(230, 220, 198, 1.0) # Soft off-white clock
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = -200, -125
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] uptime -p | sed -e 's/up /  UPTIME /' -e 's/ hours, /H/' -e 's/ minutes/M/' -e 's/ hour, /H/' -e 's/ minute/M/'
    color = rgba(185, 175, 165, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = -200, -195
    halign = center
    valign = center
    zindex = 2
}


# --- RIGHT COLUMN ---

# PROFILE CARD (Blurred)
shape {
    monitor =
    size = 360, 380
    color = rgba(0, 0, 0, 0.3)
    rounding = 25
    position = 200, 160
    halign = center
    valign = center
    zindex = 1
}

image {
    monitor =
    path = ~/Pictures/wallpapers/nixos-dark-profile.png
    size = 120
    rounding = 20
    border_size = 4
    border_color = rgba(129, 161, 193, 1.0) # Nix Blue profile border highlight
    position = 200, 260
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%a" | tr '[:lower:]' '[:upper:]')</b>"
    color = rgba(230, 220, 198, 1.0)
    font_size = 38
    font_family = JetBrainsMono Nerd Font
    position = 200, 150
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] date +"%d %B, %Y"
    color = rgba(185, 175, 165, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 200, 100
    halign = center
    valign = center
    zindex = 11
}

# SYSTEM/MEDIA STATUS CARD
shape {
    monitor =
    size = 360, 230
    color = rgba(43, 42, 39, 0.8) # Slate gray card base matching waybar
    rounding = 25
    position = 200, -95
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.5)
    zindex = 10
}

# Connectivity Buttons
shape {
    monitor =
    size = 150, 75
    color = rgba(204, 164, 124, 1.0)
    rounding = 20
    position = 115, -40
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text =   <b> </b>  
    color = rgba(25, 20, 20, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 115, -30
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] wifi=$(iw dev 2>/dev/null | awk '$1=="ssid"{print $2}' | head -n 1 | cut -c1-14); if [ -z "$wifi" ]; then echo "Disconnected"; else echo "$wifi"; fi
    color = rgba(25, 20, 20, 1.0)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 115, -55
    halign = center
    valign = center
    zindex = 12
}

shape {
    monitor =
    size = 150, 75
    color = rgba(204, 164, 124, 1.0)
    rounding = 20
    position = 285, -40
    halign = center
    valign = center
    zindex = 11
}

label {
    monitor =
    text =   <b> </b>  
    color = rgba(25, 20, 20, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 285, -30
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] bt=$(bluetoothctl info 2>/dev/null | grep "Name:" | cut -d ' ' -f 2- | cut -c 1-14); if [ -z "$bt" ]; then echo "Disconnected"; else echo "$bt"; fi
    color = rgba(25, 20, 20, 1.0)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 285, -55
    halign = center
    valign = center
    zindex = 12
}

# Battery Bar
shape {
    monitor =
    size = 320, 100
    color = rgba(129, 161, 193, 1.0) # Nix Blue for the main battery pill background
    rounding = 25
    position = 200, -145
    halign = center
    valign = center
    zindex = 11
}

# Battery Inner icon block
shape {
    monitor =
    size = 100, 20
    color = rgba(43, 42, 39, 1.0) # Slate gray base for inner accent block
    rounding = 5
    position = 200, -115
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] status=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null); if [ "$status" = "Discharging" ]; then echo " <b>!</b> "; else echo " <b>󰚥</b> "; fi
    color = rgba(129, 161, 193, 1.0) # Nix blue charging indicator icon
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 200, -115
    halign = center
    valign = center
    zindex = 13
}

label {
    monitor =
    text = cmd[update:1000] cat /sys/class/power_supply/BAT0/capacity | sed 's/.*/<b>&%<\/b>/'
    color = rgba(43, 42, 39, 1.0) # Dark text contrasting cleanly against the blue pill
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 200, -145
    halign = center
    valign = center
    zindex = 12
}

label {
    monitor =
    text = cmd[update:1000] cat /sys/class/power_supply/BAT0/status
    color = rgba(43, 42, 39, 1.0)
    font_size = 10
    font_family = JetBrainsMono Nerd Font
    position = 200, -175
    halign = center
    valign = center
    zindex = 12
}
